<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>GPS Flight Tracker</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<link rel="stylesheet" href="/static/style.css" />
</head>
<body>
<div id="app">
  <div id="map"></div>

  <div id="sidebar">
    <div id="panel-header">
      <button id="toggle-panel">☰ セッション</button>
      <button id="follow-toggle" class="active">自動追従: ON</button>
      <a id="settings-link" href="/settings" title="設定">⚙</a>
    </div>
    <div id="session-list"></div>
    <div id="aircraft-info" class="hidden"></div>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="/static/map.js"></script>
</body>
</html>
